<script>
  window.onload = function() {
    google.script.run
      .withSuccessHandler(function(res) {
        document.getElementById('skeleton-area').style.display = 'none';

        if (!res || !res.ok || !res.links || res.links.length === 0) {
          document.getElementById('empty-area').style.display = 'block';
          return;
        }

        var tbody = document.getElementById('links-tbody');
        var ahora = new Date();

        res.links.forEach(function(link) {
          var estado  = String(link.estado || '').toUpperCase();
          var expira  = link.expira_at ? new Date(link.expira_at) : null;
          if (estado === 'PENDIENTE' && expira && ahora > expira) estado = 'EXPIRADO';

          var estadoBadge = estado === 'PENDIENTE'
            ? '<span class="badge badge-green">Activo</span>'
            : estado === 'USADO'
              ? '<span class="badge badge-gray">Usado</span>'
              : '<span class="badge badge-red">Expirado</span>';

          var modoBadge = link.modo === 'PUBLICO'
            ? '<span class="badge badge-blue">Público</span>'
            : '<span class="badge badge-purple">Individual</span>';

          var candidato = link.nombre_destino || link.email_destino || '—';
          var linkUrl   = link.link_url || '';
          var linkCell  = linkUrl && estado !== 'EXPIRADO'
            ? '<a href="' + linkUrl + '" target="_blank" style="font-size:11px;color:#0a6ed1;' +
              'word-break:break-all;display:block;max-width:220px;">' +
              linkUrl.substring(0, 40) + '...</a>' +
              '<button class="copy-btn" onclick="copiar(\'' + linkUrl.replace(/'/g,"&#39;") + '\')">' +
              'Copiar</button>'
            : '<span style="color:#aaa;font-size:11px;">' + (linkUrl ? 'Expirado' : 'Sin URL') + '</span>';

          var tr = document.createElement('tr');
          tr.innerHTML =
            '<td><div style="font-weight:500;color:#1d2d3d;">' + candidato + '</div>' +
            '<div style="margin-top:3px;">' + modoBadge + '</div></td>' +
            '<td style="font-size:12px;color:#515f6e;">' + (link.id_vacante || '—') + '</td>' +
            '<td>' + linkCell + '</td>' +
            '<td style="font-size:12px;color:#515f6e;white-space:nowrap;">' +
            (expira ? expira.toLocaleDateString('es-GT') : '—') + '</td>' +
            '<td>' + estadoBadge + '</td>';
          tbody.appendChild(tr);
        });

        document.getElementById('table-area').style.display = 'block';
        if (typeof lucide !== 'undefined') lucide.createIcons();
      })
      .withFailureHandler(function(err) {
        document.getElementById('skeleton-area').style.display = 'none';
        ERP.UI.msg('error', 'Error cargando links: ' + (err && err.message ? err.message : 'sin detalle'));
      })
      .apiGetLinksPostulacion();
  };

  function copiar(url) {
    navigator.clipboard.writeText(url).then(function() {
      ERP.UI.msg('success', '✔ Link copiado al portapapeles.');
    });
  }

  if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
