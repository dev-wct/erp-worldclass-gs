<?!= include('02_core/ui/CORE_Shell'); ?>

<article class="erp-card">

  <header class="erp-card-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <button type="button" class="erp-btn erp-btn-ghost erp-btn-sm" style="padding:4px;border-radius:50%;" onclick="volver()" title="Volver">
        <i data-lucide="arrow-left" style="width:18px;height:18px;"></i>
      </button>
      <div style="width:36px;height:36px;border-radius:6px;background:#e3f2fd;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <i data-lucide="phone" style="width:18px;height:18px;color:#1565c0;"></i>
      </div>
      <div>
        <h1 style="font-size:16px;font-weight:600;color:#1d2d3d;margin:0;line-height:1.2;">Registro de Llamada</h1>
        <p style="font-size:12px;color:#515f6e;margin:2px 0 0;">SD — Control y registro de llamadas de Call Center</p>
      </div>
    </div>
    <div id="catalog-status"></div>
  </header>

  <div class="erp-card-body">
    <div id="erp-msg" class="erp-msg" style="display:none;" role="alert"></div>

    <form id="callForm" onsubmit="guardar(event)" novalidate>
      <div class="erp-form-grid">

        <p class="erp-section-title">Prospecto y Agente</p>

        <div class="erp-field erp-full">
          <label class="erp-label erp-label-required" for="id_lead">Lead (Prospecto)</label>
          <div id="sk_lead" class="erp-skeleton" style="height:42px;"></div>
          <select id="id_lead" class="erp-select" style="display:none;" required>
            <option value="">— Seleccionar prospecto —</option>
          </select>
        </div>

        <div class="erp-field erp-full">
          <label class="erp-label erp-label-required" for="id_empleado">Agente de Call Center</label>
          <div id="sk_empleado" class="erp-skeleton" style="height:42px;"></div>
          <select id="id_empleado" class="erp-select" style="display:none;" required>
            <option value="">— Seleccionar agente —</option>
          </select>
        </div>

        <p class="erp-section-title">Timer de Llamada</p>

        <div class="erp-field erp-full">
          <div class="timer-widget">
            <div class="timer-display" id="timerLabel">00:00</div>
            <button type="button" class="erp-btn erp-btn-primary erp-btn-sm" id="btnTimer" onclick="toggleTimer()">
              <i data-lucide="play" style="width:14px;height:14px;"></i> Iniciar Llamada
            </button>
          </div>
        </div>

        <div class="erp-field">
          <label class="erp-label erp-label-required" for="duracion_seg">Duración (segundos)</label>
          <input type="number" class="erp-input" id="duracion_seg" min="0" value="0" required>
        </div>

        <div class="erp-field">
          <label class="erp-label erp-label-required" for="resultado">Resultado</label>
          <select id="resultado" class="erp-select" required>
            <option value="NO CONTESTO">No Contestó</option>
            <option value="OCUPADO">Ocupado</option>
            <option value="CONTACTADO">Contactado</option>
            <option value="INTERESADO">Interesado</option>
            <option value="CITA AGENDADA">Cita Agendada</option>
            <option value="NO INTERESADO">No Interesado</option>
            <option value="TELEFONO INVALIDO">Teléfono Inválido</option>
          </select>
        </div>

        <div class="erp-field erp-full">
          <label class="erp-label" for="notas">Notas de la Llamada</label>
          <textarea id="notas" class="erp-textarea" rows="3" placeholder="Detalles de la conversación, objeciones o acuerdos..."></textarea>
        </div>

      </div>
    </form>
  </div>

  <footer class="erp-card-footer">
    <button type="button" class="erp-btn" onclick="volver()">← Volver</button>
    <button type="submit" form="callForm" id="saveBtn" class="erp-btn erp-btn-primary" disabled>
      <span id="saveSpinner" class="erp-spinner" style="width:14px;height:14px;border-width:2px;display:inline-block;"></span>
      <span id="saveTxt">Cargando...</span>
    </button>
  </footer>

</article>

<?!= include('02_core/ui/CORE_ShellClose'); ?>

<script>
  const _backUrl = '<?= getWebAppUrl() ?>?page=<?= APP_PARAMS.back ? APP_PARAMS.back : 'launchpad' ?>';
  function volver() { window.open(_backUrl, '_top'); }

  var timerInterval = null, totalSeconds = 0;

  window.onload = function() {
    ERP.Gateway.callArgs('apiGetCatalogosLlamada', [],
      function(catalogos) {
        ['lead','empleado'].forEach(function(k) {
          document.getElementById('sk_' + k).style.display  = 'none';
          document.getElementById('id_' + k).style.display = 'block';
        });
        ERP.Select.fill('id_lead', catalogos.leads || [], 'id', 'nombre',
          catalogos.leads && catalogos.leads.length ? '— Seleccionar Lead —' : 'No hay leads activos');
        ERP.Select.fill('id_empleado', catalogos.empleados || [], 'id', 'nombre',
          catalogos.empleados && catalogos.empleados.length ? '— Seleccionar Agente —' : 'No hay agentes');
        document.getElementById('saveBtn').disabled = false;
        document.getElementById('saveSpinner').style.display = 'none';
        document.getElementById('saveTxt').textContent = '💾 Guardar Llamada';
        if (typeof lucide !== 'undefined') lucide.createIcons();
      },
      function(err) { ERP.UI.msg('error', 'Error cargando catálogos: ' + err.message); }
    );
  };

  function toggleTimer() {
    var btn   = document.getElementById('btnTimer');
    var input = document.getElementById('duracion_seg');
    if (timerInterval) {
      clearInterval(timerInterval); timerInterval = null;
      btn.innerHTML = '<i data-lucide="play" style="width:14px;height:14px;"></i> Iniciar Llamada';
      btn.className = 'erp-btn erp-btn-primary erp-btn-sm';
      input.value   = totalSeconds;
    } else {
      totalSeconds = 0;
      document.getElementById('timerLabel').textContent = '00:00';
      btn.innerHTML = '<i data-lucide="square" style="width:14px;height:14px;"></i> Finalizar Llamada';
      btn.className = 'erp-btn erp-btn-sm' + ' bg-red-600 text-white border-red-600';
      timerInterval = setInterval(function() {
        totalSeconds++;
        var m = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
        var s = String(totalSeconds % 60).padStart(2, '0');
        document.getElementById('timerLabel').textContent = m + ':' + s;
        input.value = totalSeconds;
      }, 1000);
    }
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  function guardar(e) {
    e.preventDefault();
    if (timerInterval) toggleTimer();
    ERP.UI.msgHide();

    ERP.Gateway.submit({
      method: 'apiGuardarLlamada',
      payload: ERP.Form.collect(['id_lead','id_empleado','duracion_seg','resultado','notas']),
      btnId: 'saveBtn', btnText: '💾 Guardar Llamada', loadingText: 'Guardando...',
      onSuccess: function(res) {
        if (res.ok) {
          ERP.UI.msg('success', '✔ Llamada registrada correctamente.');
          setTimeout(volver, 2000);
        } else {
          ERP.UI.msg('error', (res.errores || ['Error desconocido.']).join('<br>'));
        }
      },
    });
  }
  if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
