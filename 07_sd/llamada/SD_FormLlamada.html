<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Llamada</title>
    <?!= include('02_core/CORE_DesignSystem'); ?>
    <?!= include('02_core/CORE_FormHandler'); ?>
    <style>
      /* Estilos específicos y complementarios del Timer con el Design System */
      .timer-widget {
        display: flex;
        align-items: center;
        gap: var(--sap-spacing-md);
        background-color: var(--sap-bg-hover);
        padding: var(--sap-spacing-md);
        border-radius: var(--sap-border-radius-sm);
        border: 1px dashed var(--sap-border-color);
        margin-bottom: var(--sap-spacing-lg);
        grid-column: 1 / -1;
      }
      .timer-display {
        font-size: 24px;
        font-weight: 700;
        font-family: monospace;
        color: var(--sap-text-main);
        flex-grow: 1;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="sap-container">
      <div class="sap-card">
        <div class="sap-card-header">
          <div>
            <div class="sap-card-title">📞 Registro de Llamada</div>
            <div class="sap-card-subtitle">SD - Control y Registro Quincenal de Llamadas de Call Center</div>
          </div>
        </div>

        <div class="sap-card-content">
          <div id="error" class="sap-message-strip sap-message-strip-error" style="display: none;"></div>

          <form id="callForm" onsubmit="guardar(event)">
            <div class="sap-form-grid">
              
              <div class="sap-form-group full-width">
                <label class="sap-label required" for="id_lead">Lead (Prospecto)</label>
                <select id="id_lead" class="sap-select" required>
                  <option value="">Cargando prospectos...</option>
                </select>
              </div>

              <div class="sap-form-group full-width">
                <label class="sap-label required" for="id_empleado">Agente de Call Center</label>
                <select id="id_empleado" class="sap-select" required>
                  <option value="">Cargando agentes...</option>
                </select>
              </div>

              <!-- Timer VIP Widget -->
              <div class="timer-widget">
                <div class="timer-display" id="timerLabel">00:00</div>
                <button type="button" class="sap-btn sap-btn-accept" id="btnTimer" onclick="toggleTimer()">Iniciar Llamada</button>
              </div>

              <div class="sap-form-group">
                <label class="sap-label required" for="duracion_seg">Duración (segundos)</label>
                <input type="number" class="sap-input" id="duracion_seg" min="0" value="0" required>
              </div>
              
              <div class="sap-form-group">
                <label class="sap-label required" for="resultado">Resultado</label>
                <select id="resultado" class="sap-select" required>
                  <option value="NO CONTESTO">No Contestó</option>
                  <option value="OCUPADO">Ocupado</option>
                  <option value="CONTACTADO">Contactado</option>
                  <option value="INTERESADO">Interesado</option>
                  <option value="CITA AGENDADA">Cita Agendada</option>
                  <option value="NO INTERESADO">No Interesado</option>
                  <option value="TELEFONO INVALIDO">Teléfono Inválido</option>
                </select>
              </div>

              <div class="sap-form-group full-width">
                <label class="sap-label" for="notas">Notas de la Llamada</label>
                <textarea id="notas" class="sap-textarea" placeholder="Detalles de la conversación, objeciones o acuerdos..."></textarea>
              </div>

            </div>

            <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px; padding-top:16px; border-top:1px solid var(--sap-border-light);">
              <button type="button" class="sap-btn" onclick="google.script.host.close()">Cancelar</button>
              <button type="submit" id="btnGuardar" class="sap-btn sap-btn-emphasized">💾 Guardar Llamada</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      var BTN_TEXT = '💾 Guardar Llamada';
      var timerInterval = null;
      var totalSeconds  = 0;

      window.onload = function() {
        ERP.Gateway.callArgs('apiGetCatalogosLlamada', [],
          function(catalogos) {
            ERP.Select.fill('id_lead', catalogos.leads || [], 'id', 'nombre',
              catalogos.leads && catalogos.leads.length > 0
                ? '-- Seleccionar Lead --'
                : 'No hay leads activos'
            );
            ERP.Select.fill('id_empleado', catalogos.empleados || [], 'id', 'nombre',
              catalogos.empleados && catalogos.empleados.length > 0
                ? '-- Seleccionar Agente --'
                : 'No hay agentes activos'
            );
          },
          function(err) {
            ERP.Msg.error('Error cargando catálogos: ' + err.message, 'error');
          }
        );
      };

      function toggleTimer() {
        var btn   = document.getElementById('btnTimer');
        var input = document.getElementById('duracion_seg');

        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
          btn.innerText  = 'Iniciar Llamada';
          btn.className  = 'sap-btn sap-btn-accept';
          input.value    = totalSeconds;
        } else {
          totalSeconds = 0;
          document.getElementById('timerLabel').innerText = '00:00';
          btn.innerText  = 'Finalizar Llamada';
          btn.className  = 'sap-btn sap-btn-reject';
          timerInterval = setInterval(function() {
            totalSeconds++;
            var mins = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            var secs = String(totalSeconds % 60).padStart(2, '0');
            document.getElementById('timerLabel').innerText = mins + ':' + secs;
            input.value = totalSeconds;
          }, 1000);
        }
      }

      function guardar(e) {
        e.preventDefault();
        if (timerInterval) toggleTimer();

        ERP.Btn.loading('btnGuardar');
        ERP.Msg.hide('error');

        var data = ERP.Form.collect([
          'id_lead', 'id_empleado', 'duracion_seg', 'resultado', 'notas'
        ]);

        ERP.Gateway.call('apiGuardarLlamada', data,
          function(res) {
            if (res.ok) {
              google.script.host.close();
            } else {
              ERP.Msg.error(res.errores.join('\n'), 'error');
              ERP.Btn.ready('btnGuardar', BTN_TEXT);
            }
          },
          function(err) {
            ERP.Msg.error(err.message, 'error');
            ERP.Btn.ready('btnGuardar', BTN_TEXT);
          }
        );
      }
    </script>
  </body>
</html>
