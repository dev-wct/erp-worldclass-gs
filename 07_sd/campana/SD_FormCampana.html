<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Nueva Campaña</title>
    <?!= include('02_core/CORE_DesignSystem'); ?>
    <?!= include('02_core/CORE_FormHandler'); ?>
  </head>
  <body>
    <div class="sap-container">
      <div class="sap-card">
        <div class="sap-card-header">
          <div>
            <div class="sap-card-title">📢 Registrar Nueva Campaña</div>
            <div class="sap-card-subtitle">SD - Campañas de Ventas de Membresías VIP</div>
          </div>
        </div>

        <div class="sap-card-content">
          <div id="error" class="sap-message-strip sap-message-strip-error" style="display: none;"></div>

          <form id="campForm" onsubmit="guardar(event)">
            <div class="sap-form-grid">
              
              <div class="sap-form-group full-width">
                <label class="sap-label required" for="nombre">Nombre de la Campaña</label>
                <input type="text" class="sap-input" id="nombre" placeholder="Ej. Membresías VIP Verano" required>
              </div>

              <div class="sap-form-group">
                <label class="sap-label required" for="fecha_inicio">Fecha de Inicio</label>
                <input type="date" class="sap-input" id="fecha_inicio" required>
              </div>
              
              <div class="sap-form-group">
                <label class="sap-label required" for="fecha_fin">Fecha de Fin</label>
                <input type="date" class="sap-input" id="fecha_fin" required>
              </div>

              <div class="sap-form-group">
                <label class="sap-label required" for="objetivo_citas">Objetivo de Citas</label>
                <input type="number" class="sap-input" id="objetivo_citas" min="0" placeholder="Ej. 100" required>
              </div>
              
              <div class="sap-form-group">
                <label class="sap-label required" for="estado">Estado Inicial</label>
                <select id="estado" class="sap-select">
                  <option value="PLANIFICADA">Planificada</option>
                  <option value="ACTIVA" selected>Activa</option>
                  <option value="FINALIZADA">Finalizada</option>
                </select>
              </div>

            </div>

            <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px; padding-top:16px; border-top:1px solid var(--sap-border-light);">
              <button type="button" class="sap-btn" onclick="google.script.host.close()">Cancelar</button>
              <button type="submit" id="btnGuardar" class="sap-btn sap-btn-emphasized">💾 Registrar Campaña</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      var BTN_TEXT = '💾 Registrar Campaña';

      function guardar(e) {
        e.preventDefault();
        ERP.Btn.loading('btnGuardar');
        ERP.Msg.hide('error');

        var data = ERP.Form.collect([
          'nombre', 'fecha_inicio', 'fecha_fin', 'objetivo_citas', 'estado'
        ]);

        ERP.Gateway.call('apiGuardarCampana', data,
          function(res) {
            if (res.ok) {
              google.script.host.close();
            } else {
              ERP.Msg.error(res.errores.join('\n'), 'error');
              ERP.Btn.ready('btnGuardar', BTN_TEXT);
            }
          },
          function(err) {
            ERP.Msg.error(err.message, 'error');
            ERP.Btn.ready('btnGuardar', BTN_TEXT);
          }
        );
      }
    </script>
  </body>
</html>
