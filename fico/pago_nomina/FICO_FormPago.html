<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <title>Registro de Pago de Nómina</title>
    <?!= include('core/CORE_DesignSystem'); ?>
    <style>
      /* Estilos complementarios para FICO */
      .checkbox-container {
        display: flex;
        align-items: center;
        gap: var(--sap-spacing-sm);
        margin: var(--sap-spacing-md) 0;
        grid-column: 1 / -1;
      }
      .checkbox-container input {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }
      .total-neto-card {
        background-color: var(--sap-bg-hover);
        border: 1px solid var(--sap-primary);
        border-radius: var(--sap-border-radius-sm);
        padding: var(--sap-spacing-md);
        font-size: var(--sap-font-size-lg);
        font-weight: 700;
        text-align: right;
        color: var(--sap-primary);
        margin-top: var(--sap-spacing-lg);
        grid-column: 1 / -1;
      }
    </style>
  </head>
  <body>
    <div class="sap-container">
      <div class="sap-card">
        <div class="sap-card-header">
          <div>
            <div class="sap-card-title">💵 Pago de Nómina</div>
            <div class="sap-card-subtitle">FICO - Dispersión Quincenal y Liquidación de Comisiones</div>
          </div>
        </div>

        <div class="sap-card-content">
          <div id="error" class="sap-message-strip sap-message-strip-error" style="display: none;"></div>
          <div id="info" class="sap-message-strip sap-message-strip-success" style="display: none;"></div>

          <form id="pagoForm" onsubmit="guardar(event)">
            <div class="sap-form-grid">
              
              <div class="sap-form-group full-width">
                <label class="sap-label required" for="id_empleado">Empleado (Agente)</label>
                <select id="id_empleado" class="sap-select" onchange="actualizarComisiones()" required>
                  <option value="">Cargando empleados...</option>
                </select>
              </div>

              <div class="sap-form-group">
                <label class="sap-label required" for="anio">Año</label>
                <input type="number" class="sap-input" id="anio" min="2020" max="2035" onchange="actualizarComisiones()" required>
              </div>
              
              <div class="sap-form-group">
                <label class="sap-label required" for="mes">Mes</label>
                <select id="mes" class="sap-select" onchange="actualizarComisiones()" required>
                  <option value="0">Enero</option>
                  <option value="1">Febrero</option>
                  <option value="2">Marzo</option>
                  <option value="3">Abril</option>
                  <option value="4">Mayo</option>
                  <option value="5">Junio</option>
                  <option value="6">Julio</option>
                  <option value="7">Agosto</option>
                  <option value="8">Septiembre</option>
                  <option value="9">Octubre</option>
                  <option value="10">Noviembre</option>
                  <option value="11">Diciembre</option>
                </select>
              </div>

              <div class="sap-form-group">
                <label class="sap-label required" for="quincena">Quincena</label>
                <select id="quincena" class="sap-select" onchange="actualizarComisiones()" required>
                  <option value="1">1ra Quincena (1 al 15)</option>
                  <option value="2">2da Quincena (16 al fin)</option>
                </select>
              </div>
              
              <div class="sap-form-group">
                <label class="sap-label required" for="sueldo_base">Sueldo Base</label>
                <input type="number" class="sap-input" id="sueldo_base" min="0" step="0.01" value="3500" oninput="calcularTotalNeto()" required>
              </div>

              <div class="sap-form-group">
                <label class="sap-label required" for="comisiones">Comisiones (Citas VIP)</label>
                <input type="number" class="sap-input" id="comisiones" min="0" step="0.01" value="0" oninput="calcularTotalNeto()" required>
              </div>
              
              <div class="sap-form-group">
                <label class="sap-label required" for="bonos">Bonos Adicionales</label>
                <input type="number" class="sap-input" id="bonos" min="0" step="0.01" value="0" oninput="calcularTotalNeto()" required>
              </div>

              <div class="sap-form-group">
                <label class="sap-label required" for="deducciones">Deducciones (Anticipos/IGSS)</label>
                <input type="number" class="sap-input" id="deducciones" min="0" step="0.01" value="0" oninput="calcularTotalNeto()" required>
              </div>
              
              <div class="sap-form-group">
                <label class="sap-label required" for="metodo_pago">Método de Pago</label>
                <select id="metodo_pago" class="sap-select">
                  <option value="TRANSFERENCIA" selected>Transferencia</option>
                  <option value="EFECTIVO">Efectivo</option>
                  <option value="CHEQUE">Cheque</option>
                </select>
              </div>

              <div class="checkbox-container">
                <input type="checkbox" id="pagado" onchange="togglePagadoFields()">
                <label class="sap-label" for="pagado">¿Pago ya realizado y liquidado?</label>
              </div>

              <div class="sap-form-group full-width" id="fechaPagoGroup" style="display: none;">
                <label class="sap-label" for="fecha_pago">Fecha de Pago</label>
                <input type="date" class="sap-input" id="fecha_pago">
              </div>

              <div class="total-neto-card" id="totalNetoLabel">
                Total Neto a Pagar: Q3,500.00
              </div>

            </div>

            <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px; padding-top:16px; border-top:1px solid var(--sap-border-light);">
              <button type="button" class="sap-btn" onclick="google.script.host.close()">Cancelar</button>
              <button type="submit" id="btnGuardar" class="sap-btn sap-btn-emphasized">💾 Registrar Pago</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      window.onload = function() {
        const hoy = new Date();
        document.getElementById('anio').value = hoy.getFullYear();
        document.getElementById('mes').value = hoy.getMonth();
        document.getElementById('fecha_pago').value = hoy.toISOString().split('T')[0];

        google.script.run
          .withSuccessHandler(catalogos => {
            const select = document.getElementById('id_empleado');
            select.innerHTML = '<option value="">-- Seleccionar Empleado --</option>';
            if (catalogos.empleados && catalogos.empleados.length > 0) {
              catalogos.empleados.forEach(e => {
                const opt = document.createElement('option');
                opt.value = e.id;
                opt.textContent = e.nombre;
                select.appendChild(opt);
              });
            } else {
              select.innerHTML = '<option value="">No hay empleados activos</option>';
            }
          })
          .withFailureHandler(err => {
            mostrarError('Error cargando empleados: ' + err.message);
          })
          .apiGetCatalogosPagoNomina();
      };

      function togglePagadoFields() {
        const pagado = document.getElementById('pagado').checked;
        document.getElementById('fechaPagoGroup').style.display = pagado ? 'block' : 'none';
      }

      function actualizarComisiones() {
        const idEmp = document.getElementById('id_empleado').value;
        const anio = document.getElementById('anio').value;
        const mes = document.getElementById('mes').value;
        const quincena = document.getElementById('quincena').value;

        if (!idEmp || !anio || !quincena) return;

        const infoDiv = document.getElementById('info');
        infoDiv.style.display = 'none';

        google.script.run
          .withSuccessHandler(res => {
            if (res.ok) {
              document.getElementById('comisiones').value = res.total_comisiones;
              calcularTotalNeto();
              
              if (res.ventas_concretadas > 0) {
                infoDiv.innerHTML = `<strong>¡Comisiones VIP Aplicadas!</strong> Se encontraron ${res.ventas_concretadas} ventas de citas en esta quincena.`;
                infoDiv.style.display = 'flex';
              }
            }
          })
          .withFailureHandler(err => {
            console.error('Error calculando comisiones:', err);
          })
          .apiCalcularComisionAgente(idEmp, anio, mes, quincena);
      }

      function calcularTotalNeto() {
        const sueldo = parseFloat(document.getElementById('sueldo_base').value) || 0;
        const comisiones = parseFloat(document.getElementById('comisiones').value) || 0;
        const bonos = parseFloat(document.getElementById('bonos').value) || 0;
        const deducciones = parseFloat(document.getElementById('deducciones').value) || 0;

        const total = sueldo + comisiones + bonos - deducciones;
        
        const formatted = new Intl.NumberFormat('es-GT', { style: 'currency', currency: 'GTQ' }).format(total);
        document.getElementById('totalNetoLabel').innerText = 'Total Neto a Pagar: ' + formatted;
      }

      function guardar(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnGuardar');
        btn.disabled = true;
        btn.innerHTML = '<span class="sap-spinner"></span> Guardando...';

        const data = {
          id_empleado:  document.getElementById('id_empleado').value,
          anio:         document.getElementById('anio').value,
          quincena:     document.getElementById('quincena').value,
          sueldo_base:  document.getElementById('sueldo_base').value,
          comisiones:   document.getElementById('comisiones').value,
          bonos:        document.getElementById('bonos').value,
          deducciones:  document.getElementById('deducciones').value,
          pagado:       document.getElementById('pagado').checked,
          fecha_pago:   document.getElementById('pagado').checked ? document.getElementById('fecha_pago').value : '',
          metodo_pago:  document.getElementById('metodo_pago').value
        };

        const errorDiv = document.getElementById('error');
        errorDiv.style.display = 'none';

        google.script.run
          .withSuccessHandler(res => {
            btn.disabled = false;
            btn.innerText = '💾 Registrar Pago';

            if (res.ok) {
              google.script.host.close();
            } else {
              mostrarError(res.errores.join('\n'));
            }
          })
          .withFailureHandler(err => {
            btn.disabled = false;
            btn.innerText = '💾 Registrar Pago';
            mostrarError(err.message);
          })
          .apiGuardarPagoNomina(data);
      }

      function mostrarError(msg) {
        const box = document.getElementById('error');
        box.innerText = msg;
        box.style.display = 'flex';
      }
    </script>
  </body>
</html>
