<script>
  const _backUrl = '<?= getWebAppUrl() ?>?page=<?= APP_PARAMS.back ? APP_PARAMS.back : 'launchpad' ?>';
  function volver() { window.open(_backUrl, '_top'); }

  window.onload = function() {
    ERP.Gateway.callArgs('apiGetCatalogosEquipo', [], cargarFormulario, function(err) {
      ERP.UI.msg('error', '⚠️ Error cargando catálogos: ' + err.message);
    });
  };

  function cargarFormulario(data) {
    ['tipo','marca','empresa','estado'].forEach(function(k) {
      document.getElementById('sk_' + k).style.display = 'none';
      document.getElementById('id_' + k).style.display = 'block';
    });
    ERP.Select.fill('id_tipo',    data.tipos,    'id_tipo',    'nombre', '— Seleccionar —');
    ERP.Select.fill('id_marca',   data.marcas,   'id_marca',   'nombre', '— Seleccionar —');
    ERP.Select.fill('id_empresa', data.empresas, 'id_empresa', 'nombre', '— Seleccionar —');
    ERP.Select.fill('id_estado',  data.estados,  'id_estado',  'nombre', '— Seleccionar —');
    ERP.Select.autoSelect('id_estado', 'bodega');
    document.getElementById('codigo_interno').value = 'EQ-' + String(data.nextId).padStart(4, '0');
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('saveSpinner').style.display = 'none';
    document.getElementById('saveTxt').textContent = '💾 Guardar Equipo';
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  function guardar(e) {
    e.preventDefault();
    ERP.UI.msgHide();
    ERP.Gateway.submit({
      method: 'apiGuardarEquipo',
      payload: ERP.Form.collect(['id_tipo','id_marca','modelo','serial','id_empresa','id_estado','fecha_compra','garantia_hasta','valor_compra','link_factura','link_foto','observaciones']),
      btnId: 'saveBtn', btnText: '💾 Guardar Equipo', loadingText: 'Guardando...',
      onSuccess: function(res) {
        if (res.ok) {
          ERP.UI.msg('success', '✔ ' + res.mensaje);
          setTimeout(volver, 1500);
        } else {
          ERP.UI.msg('error', '⚠️ ' + (res.errores || ['Error desconocido.']).join('<br>'));
        }
      },
    });
  }
  if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
