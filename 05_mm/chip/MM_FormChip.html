<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Chip SIM</title>
  <?!= include('02_core/CORE_DesignSystem'); ?>
  <?!= include('02_core/CORE_FormHandler'); ?>
</head>
<body>

<div class="sap-container">
  <div class="sap-card">
    <div class="sap-card-header">
      <div>
        <div class="sap-card-title">📱 Registrar Chip SIM (Línea)</div>
        <div class="sap-card-subtitle">MM - Control de Líneas Telefónicas Corporativas</div>
      </div>
    </div>
    
    <div class="sap-card-content">
      <div id="msg" class="sap-message-strip" style="display: none;"></div>
      
      <form id="chipForm" onsubmit="guardar(event)">
        <div class="sap-form-grid">
          
          <!-- SECCIÓN: IDENTIFICACIÓN -->
          <div class="sap-section-title">Identificación de la Línea</div>
    
          <div class="sap-form-group">
            <label class="sap-label">Código Interno</label>
            <input type="text" id="codigo_interno" class="sap-input" style="background:#f1f5f9; cursor:not-allowed;" readonly placeholder="Cargando secuencial...">
          </div>
    
          <div class="sap-form-group">
            <label class="sap-label required">Número de Teléfono</label>
            <input type="tel" id="numero" class="sap-input" placeholder="Ej: 50255551234" required>
          </div>
    
          <div class="sap-form-group">
            <label class="sap-label required">Operadora</label>
            <select id="id_operadora" class="sap-select" required>
              <option value="">— Seleccionar —</option>
            </select>
          </div>
    
          <div class="sap-form-group">
            <label class="sap-label">Plan Contratado</label>
            <input type="text" id="plan" class="sap-input" placeholder="Ej: Corporativo Sin Límites">
          </div>
    
          <!-- SECCIÓN: PROPIEDAD Y COSTO -->
          <div class="sap-section-title">Propiedad y Costos</div>
    
          <div class="sap-form-group">
            <label class="sap-label required">Empresa Propietaria</label>
            <select id="id_empresa" class="sap-select" required>
              <option value="">— Seleccionar —</option>
            </select>
          </div>
    
          <div class="sap-form-group">
            <label class="sap-label required">Estado de la Línea</label>
            <select id="id_estado" class="sap-select" required>
              <option value="">— Seleccionar —</option>
            </select>
          </div>
    
          <div class="sap-form-group">
            <label class="sap-label required">Costo Mensual (GTQ)</label>
            <input type="number" id="costo_mensual" class="sap-input" placeholder="0.00" min="0" step="0.01" oninput="actualizarPreviewCosto()" required>
          </div>
    
          <div class="sap-form-group">
            <label class="sap-label">Fecha de Activación</label>
            <input type="date" id="fecha_activacion" class="sap-input">
          </div>
    
          <div id="costo_preview" class="sap-message-strip sap-message-strip-warning full-width" style="display: none; grid-column: 1 / -1; margin-bottom: 0;"></div>
    
          <!-- SECCIÓN: OBSERVACIONES -->
          <div class="sap-section-title">Observaciones</div>
    
          <div class="sap-form-group full-width">
            <textarea id="observaciones" class="sap-textarea" rows="3" placeholder="Notas adicionales sobre la SIM card..."></textarea>
          </div>
    
        </div>
    
        <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px; padding-top:16px; border-top:1px solid var(--sap-border-light);">
          <button type="button" class="sap-btn" onclick="google.script.host.close()">Cancelar</button>
          <button type="submit" class="sap-btn sap-btn-emphasized" id="saveBtn">💾 Guardar Chip</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  var BTN_TEXT = '💾 Guardar Chip';

  window.onload = function() {
    ERP.Gateway.callArgs('apiGetCatalogosChip', [], cargarFormulario, function(err) {
      ERP.Msg.error('⚠️ Error cargando catálogos: ' + err.message);
    });
  };

  function cargarFormulario(data) {
    ERP.Select.fill('id_operadora', data.operadoras, 'id_operadora', 'nombre', '— Seleccionar —');
    ERP.Select.fill('id_empresa',   data.empresas,   'id_empresa',   'nombre', '— Seleccionar —');
    ERP.Select.fill('id_estado',    data.estados,    'id_estado',    'nombre', '— Seleccionar —');
    ERP.Select.autoSelect('id_estado', 'bodega');
    document.getElementById('codigo_interno').value = 'SIM-' + String(data.nextId).padStart(4, '0');
  }

  // Preview de costo anual — lógica de display puro (no negocio)
  function actualizarPreviewCosto() {
    var costo   = parseFloat(document.getElementById('costo_mensual').value);
    var preview = document.getElementById('costo_preview');
    if (costo > 0) {
      preview.innerHTML  = '💡 Gasto anual proyectado de la línea: <strong>GTQ ' + (costo * 12).toFixed(2) + '</strong>';
      preview.style.display = 'flex';
    } else {
      preview.style.display = 'none';
    }
  }

  function guardar(e) {
    e.preventDefault();
    var original = ERP.Btn.loading('saveBtn');
    ERP.Msg.hide();

    var data = ERP.Form.collect([
      'numero', 'id_operadora', 'plan', 'id_empresa', 'id_estado',
      'costo_mensual', 'fecha_activacion', 'observaciones'
    ]);

    ERP.Gateway.call('apiGuardarChip', data,
      function(res) {
        if (res.ok) {
          ERP.Msg.success('✔ ' + res.mensaje);
          setTimeout(function() { google.script.host.close(); }, 1500);
        } else {
          ERP.Msg.error('⚠️ ' + res.errores.join('\n'));
          ERP.Btn.ready('saveBtn', BTN_TEXT);
        }
      },
      function(err) {
        ERP.Msg.error('⚠️ Error del Sistema: ' + err.message);
        ERP.Btn.ready('saveBtn', BTN_TEXT);
      }
    );
  }
</script>
</body>
</html>
