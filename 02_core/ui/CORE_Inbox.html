<body class="bg-canvas text-ink font-sans m-0 p-0 overflow-hidden flex flex-col h-screen">

  <!-- SHELLBAR -->
  <div class="shellbar">
    <div class="sb-left" onclick="window.open('<?= getWebAppUrl() ?>?page=launchpad', '_top')" style="cursor:pointer;">
      <div class="sb-logo"><i data-lucide="layers" class="w-4 h-4 text-white"></i></div>
      <span class="sb-name hover:underline">WorldClass ERP</span>
      <span class="sb-sep">/</span>
      <span class="sb-mod">My Inbox</span>
    </div>
    <div class="sb-right">
      <div class="sb-status"><div class="sb-dot"></div>Online</div>
      <div class="sb-avatar"><i data-lucide="inbox" class="w-4 h-4 text-white"></i></div>
    </div>
  </div>

  <div id="app" class="flex flex-1 overflow-hidden">
    <!-- MASTER LIST (IZQUIERDA) -->
    <div class="w-1/3 max-w-[400px] bg-slate-50 border-r border-border-subtle flex flex-col">
      <div class="p-5 border-b border-border-subtle bg-white shadow-sm z-10">
        <h2 class="text-xl font-semibold text-ink">Bandeja de Entrada</h2>
        <p class="text-sm text-muted mt-1">Tareas pendientes de aprobación</p>
      </div>
      <div id="inbox-list" class="flex-1 overflow-y-auto p-5 space-y-3">
        <!-- Skeleton loaders (mientras carga) -->
        <div class="erp-skeleton h-[90px] w-full rounded-xl"></div>
        <div class="erp-skeleton h-[90px] w-full rounded-xl"></div>
      </div>
    </div>

    <!-- DETAIL VIEW (DERECHA) -->
    <div id="detail-view" class="flex-1 bg-white flex flex-col hidden relative">
      <div class="flex-1 overflow-y-auto p-10">
        <div class="max-w-3xl mx-auto">
          <div class="mb-8">
            <span id="detail-badge" class="erp-badge erp-badge-blue mb-4">WORKFLOW</span>
            <h1 id="detail-title" class="text-3xl font-semibold tracking-tight text-ink">Título de la Tarea</h1>
            <p id="detail-date" class="text-sm text-muted mt-2">Recibido: ...</p>
          </div>

          <div class="bg-slate-50 border border-slate-100 rounded-2xl p-8">
            <h3 class="text-xs font-semibold text-muted uppercase tracking-wider mb-5 border-b border-slate-200 pb-3">Contexto (Payload)</h3>
            <div id="detail-payload" class="grid grid-cols-1 sm:grid-cols-2 gap-y-6 gap-x-8 text-sm">
              <!-- Datos dinámicos -->
            </div>
          </div>
          
          <div class="mt-8 erp-field">
            <label class="erp-label font-semibold text-ink">Notas de Resolución (Opcional)</label>
            <textarea id="detail-notes" class="erp-textarea bg-white" placeholder="Escribe el motivo si rechazas, o notas adicionales si apruebas..."></textarea>
          </div>
        </div>
      </div>

      <!-- FOOTER FIXED (BOTONES) -->
      <div class="sticky bottom-0 bg-white/90 backdrop-blur-md border-t border-border-subtle p-5 flex justify-end gap-3 shadow-[0_-4px_12px_rgba(0,0,0,0.02)]">
        <button onclick="rechazarTarea()" class="px-6 py-2.5 bg-white border border-border text-error font-medium rounded-lg hover:bg-error-light hover:border-error-light transition-colors shadow-sm">Rechazar</button>
        <button onclick="aprobarTarea()" class="px-8 py-2.5 bg-slate-900 text-white font-medium rounded-lg hover:bg-slate-800 shadow-md transition-transform active:scale-95">Aprobar</button>
      </div>
    </div>
    
    <!-- EMPTY STATE -->
    <div id="empty-state" class="flex-1 bg-slate-50 flex flex-col items-center justify-center text-center p-8 hidden">
      <div class="w-20 h-20 bg-success-light text-success rounded-full flex items-center justify-center mb-6 shadow-sm">
        <i data-lucide="check-circle-2" class="w-10 h-10"></i>
      </div>
      <h2 class="text-2xl font-semibold text-ink">Bandeja limpia</h2>
      <p class="text-muted mt-2 text-lg">No tienes tareas pendientes por el momento.</p>
    </div>
  </div>

  <script>
    let currentTasks = [];
    let activeTask = null;

    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      loadTasks();
    });

    function loadTasks() {
      google.script.run
        .withSuccessHandler(renderTaskList)
        .withFailureHandler(err => alert("Error al cargar Inbox: " + err))
        .apiGetMyPendingTasks();
    }

    function renderTaskList(res) {
      if (!res.ok) { alert(res.errores.join(', ')); return; }
      
      const tasks = res.data;
      currentTasks = tasks;
      const listDiv = document.getElementById('inbox-list');
      const detailView = document.getElementById('detail-view');
      const emptyState = document.getElementById('empty-state');

      listDiv.innerHTML = '';
      
      if (tasks.length === 0) {
        detailView.classList.add('hidden');
        emptyState.classList.remove('hidden');
        return;
      }
      
      emptyState.classList.add('hidden');
      detailView.classList.add('hidden'); 

      tasks.forEach(t => {
        const d = new Date(t.fecha_creacion).toLocaleDateString();
        const html = `
          <div onclick="selectTask('${t.id_workitem}')" class="p-4 bg-white border border-border rounded-xl cursor-pointer hover:border-primary hover:shadow-md transition-all text-left">
            <div class="flex items-center justify-between mb-2">
              <span class="erp-badge erp-badge-neutral text-[10px]">${t.tipo_workflow}</span>
              <span class="text-xs text-muted">${d}</span>
            </div>
            <h3 class="text-sm font-semibold text-ink line-clamp-2">${t.titulo_tarea}</h3>
            <p class="text-xs text-muted mt-1 truncate">De: ${t.solicitante}</p>
          </div>
        `;
        listDiv.innerHTML += html;
      });
    }

    function selectTask(id) {
      activeTask = currentTasks.find(t => t.id_workitem === id);
      if (!activeTask) return;

      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('detail-view').classList.remove('hidden');
      
      document.getElementById('detail-title').innerText = activeTask.titulo_tarea;
      document.getElementById('detail-date').innerText = "Solicitado el: " + new Date(activeTask.fecha_creacion).toLocaleString() + " por " + activeTask.solicitante;
      document.getElementById('detail-badge').innerText = activeTask.tipo_workflow.replace(/_/g, ' ');
      document.getElementById('detail-notes').value = '';

      const pDiv = document.getElementById('detail-payload');
      pDiv.innerHTML = '';
      
      for (const [key, value] of Object.entries(activeTask.payload || {})) {
        pDiv.innerHTML += `
          <div>
            <div class="text-[11px] font-semibold text-muted uppercase">${key.replace(/_/g, ' ')}</div>
            <div class="text-ink mt-1 font-medium text-[15px] bg-white px-3 py-2 border border-slate-100 rounded-lg shadow-sm">${value || '—'}</div>
          </div>
        `;
      }
    }

    function aprobarTarea() {
      if (!activeTask) return;
      const notas = document.getElementById('detail-notes').value;
      
      // Ocultar inmediato para UX
      document.getElementById('detail-view').classList.add('hidden');
      document.getElementById('inbox-list').innerHTML = '<div class="erp-spinner text-primary mx-auto block mt-10"></div>';
      
      google.script.run
        .withSuccessHandler(res => {
          if (!res.ok) alert(res.errores.join(', '));
          loadTasks();
        })
        .apiApproveTask(activeTask.id_workitem, notas);
    }

    function rechazarTarea() {
      if (!activeTask) return;
      const notas = document.getElementById('detail-notes').value;
      if (!notas) { alert("Debes ingresar un motivo en las notas para rechazar."); return; }
      
      document.getElementById('detail-view').classList.add('hidden');
      document.getElementById('inbox-list').innerHTML = '<div class="erp-spinner text-error mx-auto block mt-10"></div>';

      google.script.run
        .withSuccessHandler(res => {
          if (!res.ok) alert(res.errores.join(', '));
          loadTasks();
        })
        .apiRejectTask(activeTask.id_workitem, notas);
    }
  </script>
</body>
