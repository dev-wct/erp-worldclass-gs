<script>
/**
 * CORE_FormHandler
 * ─────────────────────────────────────────────────────────────────────────
 * Librería JS compartida por TODOS los formularios del ERP.
 * Se incluye en cada form con: <?!= include('02_core/CORE_FormHandler'); ?>
 *
 * Filosofía:
 *  - Funcional puro para utilidades (llenarSelect, formatCurrency, recogerFormData)
 *  - Estado de UI encapsulado en closures (setBtnLoading / setBtnReady)
 *  - Sin dependencias externas — solo DOM + google.script.run
 *
 * Isomorfismo futuro (Hono/Vercel/Svelte):
 *  Cuando se migre del stack GAS, solo cambiar `ERP.Gateway.call()`.
 *  Los forms no tocan google.script.run directamente; lo hacen a través del Gateway.
 * ─────────────────────────────────────────────────────────────────────────
 */

// ─── Namespace raíz (idempotente — GAS no tiene módulos) ─────────────────────
var ERP = ERP || {};

// ─── ERP.Msg — manejo de mensajes / strips ────────────────────────────────────
ERP.Msg = (function() {
  /**
   * Muestra un message strip SAP Horizon en el elemento con id dado.
   * @param {string} elementId  — id del div contenedor (defecto: 'msg')
   * @param {'success'|'error'|'warning'|'info'} type
   * @param {string} text       — texto o HTML a mostrar
   */
  function show(text, type, elementId) {
    type       = type       || 'error';
    elementId  = elementId  || 'msg';
    var el = document.getElementById(elementId);
    if (!el) return;
    el.className    = 'sap-message-strip sap-message-strip-' + type;
    el.innerHTML    = text;
    el.style.display = 'flex';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function hide(elementId) {
    elementId = elementId || 'msg';
    var el = document.getElementById(elementId);
    if (el) el.style.display = 'none';
  }

  function success(text, elementId) { show(text, 'success', elementId); }
  function error(text, elementId)   { show(text, 'error',   elementId); }
  function warning(text, elementId) { show(text, 'warning', elementId); }
  function info(text, elementId)    { show(text, 'info',    elementId); }

  return { show: show, hide: hide, success: success, error: error, warning: warning, info: info };
})();


// ─── ERP.Btn — estado de loading en botones ───────────────────────────────────
ERP.Btn = (function() {
  /**
   * Pone el botón en estado cargando (spinner + texto).
   * @param {string|HTMLElement} btn  — id string o elemento DOM
   * @returns {string} — texto original del botón (para restaurar después)
   */
  function loading(btn, loadingText) {
    if (typeof btn === 'string') btn = document.getElementById(btn);
    if (!btn) return '';
    var original = btn.innerText || btn.textContent;
    btn.disabled  = true;
    btn.innerHTML = '<span class="sap-spinner"></span> ' + (loadingText || 'Guardando...');
    return original;
  }

  /**
   * Restaura el botón a su estado activo.
   * @param {string|HTMLElement} btn
   * @param {string} originalText  — texto a restaurar
   */
  function ready(btn, originalText) {
    if (typeof btn === 'string') btn = document.getElementById(btn);
    if (!btn) return;
    btn.disabled  = false;
    btn.innerText = originalText || 'Guardar';
  }

  return { loading: loading, ready: ready };
})();


// ─── ERP.Select — carga de catálogos en selects ───────────────────────────────
ERP.Select = (function() {
  /**
   * Puebla un <select> con un array de objetos.
   * @param {string}   id           — id del elemento <select>
   * @param {Array}    items        — array de objetos del catálogo
   * @param {string}   valueField   — propiedad del objeto para option.value
   * @param {string|Function} labelFn — propiedad para textContent, o función (item) => string
   * @param {string}   [emptyLabel] — texto de la opción vacía (si omitido no agrega)
   */
  function fill(id, items, valueField, labelFn, emptyLabel) {
    var sel = document.getElementById(id);
    if (!sel) return;

    // Limpiar opciones dinámicas (no la primera si es placeholder)
    sel.innerHTML = '';

    if (emptyLabel !== undefined) {
      var placeholder = document.createElement('option');
      placeholder.value       = '';
      placeholder.textContent = emptyLabel;
      sel.appendChild(placeholder);
    }

    if (!items || items.length === 0) return;

    var getLabel = (typeof labelFn === 'function')
      ? labelFn
      : function(item) { return item[labelFn]; };

    items.forEach(function(item) {
      var opt = document.createElement('option');
      opt.value       = item[valueField];
      opt.textContent = getLabel(item);
      sel.appendChild(opt);
    });
  }

  /**
   * Selecciona automáticamente la primera opción cuyo texto incluye una cadena.
   * Útil para pre-seleccionar "En Bodega" en selectores de estado.
   * @param {string} id     — id del <select>
   * @param {string} needle — fragmento a buscar (case-insensitive)
   */
  function autoSelect(id, needle) {
    var sel = document.getElementById(id);
    if (!sel) return;
    var lower = needle.toLowerCase();
    for (var i = 0; i < sel.options.length; i++) {
      if (sel.options[i].text.toLowerCase().includes(lower)) {
        sel.selectedIndex = i;
        return;
      }
    }
  }

  return { fill: fill, autoSelect: autoSelect };
})();


// ─── ERP.Form — utilidades de formulario ──────────────────────────────────────
ERP.Form = (function() {
  /**
   * Recoge todos los campos de un formulario por id de elemento.
   * @param {string[]} fieldIds — array de ids
   * @returns {Object} — { id: value, ... }
   */
  function collect(fieldIds) {
    return fieldIds.reduce(function(acc, id) {
      var el = document.getElementById(id);
      if (!el) return acc;
      acc[id] = (el.type === 'checkbox') ? el.checked : el.value;
      return acc;
    }, {});
  }

  /**
   * Formatea un número como moneda GTQ usando Intl.NumberFormat.
   * @param {number} amount
   * @returns {string}
   */
  function formatGTQ(amount) {
    return new Intl.NumberFormat('es-GT', {
      style:    'currency',
      currency: 'GTQ'
    }).format(isNaN(amount) ? 0 : amount);
  }

  return { collect: collect, formatGTQ: formatGTQ };
})();


// ─── ERP.Gateway — adaptador isomórfico GAS ↔ Hono ────────────────────────────
ERP.Gateway = (function() {
  /**
   * Llama a una función del servidor GAS.
   * Firma idéntica a como se usaría con fetch('/api/...') en Hono/Vercel.
   *
   * @param {string}   method      — nombre de la función GAS (ej. 'apiGuardarLead')
   * @param {any}      payload     — datos a enviar
   * @param {Function} onSuccess   — callback(res)
   * @param {Function} onFailure   — callback(err)
   * @param {...any}   extraArgs   — argumentos adicionales para funciones que los requieran
   */
  function call(method, payload, onSuccess, onFailure) {
    var extraArgs = Array.prototype.slice.call(arguments, 3);
    // onFailure podría ser el 4to arg si no hay extraArgs, o el 5to si los hay
    // Reordenar: call(method, payload, onSuccess, onFailure, ...extraArgs)
    if (typeof onFailure !== 'function') {
      // shift args
      extraArgs  = [onFailure].concat(extraArgs);
      onFailure  = defaultFailure;
    }

    var runner = google.script.run
      .withSuccessHandler(onSuccess)
      .withFailureHandler(onFailure || defaultFailure);

    if (extraArgs.length > 0) {
      runner[method].apply(runner, [payload].concat(extraArgs));
    } else {
      runner[method](payload);
    }
  }

  /**
   * Versión multi-argumento para funciones GAS que reciben más de un parámetro.
   * Ej: apiCalcularComisionAgente(idEmp, anio, mes, quincena)
   *
   * @param {string}   method    — nombre de la función GAS
   * @param {any[]}    args      — array de argumentos en orden
   * @param {Function} onSuccess
   * @param {Function} onFailure
   */
  function callArgs(method, args, onSuccess, onFailure) {
    var runner = google.script.run
      .withSuccessHandler(onSuccess)
      .withFailureHandler(onFailure || defaultFailure);
    runner[method].apply(runner, args);
  }

  function defaultFailure(err) {
    ERP.Msg.error('⚠️ Error del Sistema: ' + (err.message || err));
  }

  return { call: call, callArgs: callArgs };
})();
</script>
