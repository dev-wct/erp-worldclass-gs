    CORE_Head.html        → Tailwind config + tokens + componentes CSS

<style>
  /*
   * Aliases de compatibilidad: clases .sap-* → variables CSS → tokens Tailwind.
   * Permite que el código legacy siga funcionando sin modificación
   * mientras se migra formulario por formulario.
   *
   * Estas variables imitan el contrato visual del design system anterior
   * pero usan los tokens del nuevo sistema como valores.
   */
  :root {
    --sap-primary:        #0a6ed1;
    --sap-primary-hover:  #0854a0;
    --sap-primary-light:  rgba(10, 110, 209, 0.08);
    --sap-text-main:      #1d2d3d;
    --sap-text-secondary: #515f6e;
    --sap-text-white:     #ffffff;
    --saphttps://script.google.com/macros/s/AKfycbzyMt6OKz3Y2kxFozCoKvUj3KMj4to0wG8a-Y13sb3KunlP56WNcVrmV_p0Gx2-kmfsiw/exec?vacante=4&token=52053656-b2d6-41e8-9b66-6c5ea26f92a0-bg-body:        #f5f6f7;
    --sap-bg-card:        #ffffff;
    --sap-bg-hover:       #f0f4f8;
    --sap-success:        #107e3e;
    --sap-success-light:  #eef7f2;
    --sap-error:          #bb0000;
    --sap-error-light:    #fdf2f2;
    --sap-warning:        #e9730c;
    --sap-warning-light:  #fff8f2;
    --sap-info:           #0a6ed1;
    --sap-info-light:     #f2f7fd;
    --sap-border-color:   #d9d9d9;
    --sap-border-light:   #ebebeb;
    --sap-border-focus:   #0a6ed1;
    --sap-focus-ring:     rgba(10, 110, 209, 0.3);
    --sap-font-family:    'Inter', system-ui, -apple-system, sans-serif;
    --sap-font-size-base: 14px;
    --sap-font-size-sm:   12px;
    --sap-font-size-lg:   16px;
    --sap-font-size-title:18px;
    --sap-spacing-xs:     4px;
    --sap-spacing-sm:     8px;
    --sap-spacing-md:     16px;
    --sap-spacing-lg:     24px;
    --sap-spacing-xl:     32px;
    --sap-border-radius-sm: 4px;
    --sap-border-radius-md: 8px;
    --sap-border-radius-lg: 12px;
    --sap-shadow-sutil:   0 4px 12px rgba(29,45,61,.04), 0 1px 2px rgba(29,45,61,.06);
    --sap-shadow-focus:   0 0 0 3px var(--sap-focus-ring);
    --sap-transition:     all 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Reset ──────────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sap-font-family);
    font-size:   var(--sap-font-size-base);
    color:       var(--sap-text-main);
    background:  var(--sap-bg-body);
    line-height: 1.5;
    padding:     var(--sap-spacing-lg);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ─────────────────────────────────────────────────────────── */
  .sap-container { max-width: 1000px; margin: 0 auto; padding-top: 12px; }

  .sap-card {
    background:    var(--sap-bg-card);
    border:        1px solid var(--sap-border-light);
    border-radius: var(--sap-border-radius-md);
    box-shadow:    var(--sap-shadow-sutil);
    overflow:      hidden;
    margin-bottom: var(--sap-spacing-lg);
    transition:    var(--sap-transition);
  }

  .sap-card-header {
    padding:       var(--sap-spacing-md) var(--sap-spacing-lg);
    border-bottom: 1px solid var(--sap-border-light);
    display:       flex;
    align-items:   center;
    justify-content: space-between;
  }

  .sap-card-title {
    font-size:   var(--sap-font-size-title);
    font-weight: 600;
    color:       var(--sap-text-main);
  }

  .sap-card-subtitle {
    font-size:  var(--sap-font-size-sm);
    color:      var(--sap-text-secondary);
    margin-top: 2px;
  }

  .sap-card-content { padding: var(--sap-spacing-lg); }

  .sap-card-footer {
    padding:          var(--sap-spacing-md) var(--sap-spacing-lg);
    background-color: var(--sap-bg-body);
    border-top:       1px solid var(--sap-border-light);
    display:          flex;
    justify-content:  flex-end;
    gap:              var(--sap-spacing-md);
  }

  /* ── Shellbar ───────────────────────────────────────────────────────── */
  .sap-shellbar {
    display:          flex;
    align-items:      center;
    justify-content:  space-between;
    height:           48px;
    background-color: #1d2b3a;
    color:            var(--sap-text-white);
    padding:          0 var(--sap-spacing-md);
    position:         fixed;
    top: 0; left: 0; right: 0;
    z-index:          1000;
    box-shadow:       0 2px 4px rgba(0,0,0,.1);
  }

  .sap-shellbar-brand {
    display:     flex;
    align-items: center;
    gap:         var(--sap-spacing-sm);
    font-weight: 600;
    font-size:   var(--sap-font-size-lg);
  }

  /* ── Formularios ────────────────────────────────────────────────────── */
  .sap-form-grid {
    display:               grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap:                   var(--sap-spacing-md);
    margin-bottom:         var(--sap-spacing-lg);
  }

  .sap-form-group {
    display:        flex;
    flex-direction: column;
    gap:            var(--sap-spacing-xs);
  }

  .sap-form-group.full-width { grid-column: 1 / -1; }

  .sap-label {
    font-size:   var(--sap-font-size-base);
    font-weight: 500;
    color:       var(--sap-text-secondary);
  }

  .sap-label.required::after {
    content:     " *";
    color:       var(--sap-error);
    font-weight: 600;
  }

  .sap-input, .sap-select, .sap-textarea {
    font-family:   var(--sap-font-family);
    font-size:     var(--sap-font-size-base);
    color:         var(--sap-text-main);
    padding:       10px 12px;
    border:        1px solid var(--sap-border-color);
    border-radius: var(--sap-border-radius-sm);
    background:    var(--sap-bg-card);
    outline:       none;
    transition:    var(--sap-transition);
    width:         100%;
  }

  .sap-input:hover, .sap-select:hover, .sap-textarea:hover {
    border-color: var(--sap-text-secondary);
  }

  .sap-input:focus, .sap-select:focus, .sap-textarea:focus {
    border-color: var(--sap-border-focus);
    box-shadow:   var(--sap-shadow-focus);
  }

  .sap-input:disabled, .sap-select:disabled, .sap-textarea:disabled {
    background:   var(--sap-bg-body);
    color:        var(--sap-text-secondary);
    cursor:       not-allowed;
    border-color: var(--sap-border-light);
  }

  .sap-textarea { resize: vertical; min-height: 80px; }

  /* ── Botones ────────────────────────────────────────────────────────── */
  .sap-btn {
    font-family:  var(--sap-font-family);
    font-size:    var(--sap-font-size-base);
    font-weight:  500;
    padding:      10px 20px;
    border:       1px solid var(--sap-border-color);
    border-radius: var(--sap-border-radius-sm);
    cursor:       pointer;
    background:   var(--sap-bg-card);
    color:        var(--sap-text-main);
    display:      inline-flex;
    align-items:  center;
    justify-content: center;
    gap:          var(--sap-spacing-sm);
    transition:   var(--sap-transition);
    outline:      none;
  }

  .sap-btn:hover             { background: var(--sap-bg-hover); border-color: var(--sap-text-secondary); }
  .sap-btn:focus             { box-shadow: var(--sap-shadow-focus); border-color: var(--sap-border-focus); }
  .sap-btn:disabled          { opacity: 0.6; cursor: not-allowed; box-shadow: none !important; }

  .sap-btn-emphasized        { background: var(--sap-primary); border-color: var(--sap-primary); color: var(--sap-text-white); }
  .sap-btn-emphasized:hover  { background: var(--sap-primary-hover); border-color: var(--sap-primary-hover); }
  .sap-btn-accept            { background: var(--sap-success); border-color: var(--sap-success); color: var(--sap-text-white); }
  .sap-btn-reject            { background: var(--sap-error);   border-color: var(--sap-error);   color: var(--sap-text-white); }

  .sap-btn-ghost             { background: transparent; border-color: transparent; color: var(--sap-primary); }
  .sap-btn-ghost:hover       { background: var(--sap-primary-light); border-color: transparent; }

  /* ── Message strips ─────────────────────────────────────────────────── */
  .sap-message-strip {
    display:       flex;
    align-items:   flex-start;
    gap:           var(--sap-spacing-md);
    padding:       var(--sap-spacing-md);
    border-radius: var(--sap-border-radius-sm);
    margin-bottom: var(--sap-spacing-lg);
    font-size:     var(--sap-font-size-base);
    border-left:   4px solid var(--sap-info);
    background:    var(--sap-info-light);
  }

  .sap-message-strip-success { border-left-color: var(--sap-success); background: var(--sap-success-light); color: #0c5c2d; }
  .sap-message-strip-error   { border-left-color: var(--sap-error);   background: var(--sap-error-light);   color: #900000; }
  .sap-message-strip-warning { border-left-color: var(--sap-warning); background: var(--sap-warning-light); color: #b05609; }

  /* ── Section title ──────────────────────────────────────────────────── */
  .sap-section-title {
    font-size:      var(--sap-font-size-base);
    font-weight:    600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color:          var(--sap-text-secondary);
    border-bottom:  1px solid var(--sap-border-light);
    padding-bottom: var(--sap-spacing-xs);
    margin:         var(--sap-spacing-lg) 0 var(--sap-spacing-md) 0;
    grid-column:    1 / -1;
  }

  /* ── Spinner ────────────────────────────────────────────────────────── */
  .sap-spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,.3);
    border-radius: 50%;
    border-top-color: white;
    animation: sap-spin 0.8s ease-in-out infinite;
    display: inline-block;
  }

  @keyframes sap-spin { to { transform: rotate(360deg); } }

  /* ── Utilities ──────────────────────────────────────────────────────── */
  .sap-flex-row   { display: flex; align-items: center; gap: var(--sap-spacing-md); }
  .sap-text-muted { font-size: var(--sap-font-size-sm); color: var(--sap-text-secondary); }
</style>
