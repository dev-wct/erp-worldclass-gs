<!--
  CORE_Shell.html
  ─────────────────────────────────────────────────────────────────────────
  Wrapper de layout unificado con navegación lateral (Sidebar) y Shellbar.
  Evita la duplicación de cabeceras, pies de página y menús en cada módulo.
  
  Uso: include('00_portal/ui/PORTAL_Shell'); al inicio de la página.
  Cierre: include('00_portal/ui/PORTAL_ShellClose'); al final de la página.
  ─────────────────────────────────────────────────────────────────────────
-->
<!DOCTYPE html>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <?!= include('00_portal/ui/PORTAL_Head'); ?>
  <style>
    /* Estructura del layout con Sidebar */
    .app-layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #f5f6f7;
    }
    .app-viewport {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .app-sidebar {
      width: 240px;
      background: #0d1527;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1e293b;
      transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
      z-index: 1000;
    }
    .app-sidebar.collapsed {
      width: 52px;
    }
    .app-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 96px;
      display: flex;
      flex-direction: column;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      color: rgba(255,255,255,.55);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.15s, background 0.15s;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      border-left: 3px solid transparent;
    }
    .nav-item:hover {
      background: rgba(255,255,255,.05);
      color: #ffffff;
    }
    .nav-item.active {
      background: rgba(59,130,246,.15);
      color: #60a5fa;
      border-left-color: #3b82f6;
    }
    .nav-text {
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .app-sidebar.collapsed .nav-text {
      opacity: 0;
      pointer-events: none;
      width: 0;
    }
    .app-sidebar.collapsed .nav-item {
      padding: 10px 14px;
    }
    .app-sidebar.collapsed .nav-header {
      display: none !important;
    }
    
    /* Botón colapsar */
    .sidebar-toggle-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,.4);
      cursor: pointer;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      width: 100%;
      text-align: left;
      font-size: 11px;
    }
    .sidebar-toggle-btn:hover {
      color: #ffffff;
      background: rgba(255,255,255,.02);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .app-sidebar {
        position: fixed;
        left: 0;
        top: 48px;
        bottom: 0;
        width: 240px;
        transform: translateX(-100%);
      }
      .app-sidebar.mobile-open {
        transform: translateX(0);
        box-shadow: 4px 0 24px rgba(0,0,0,0.25);
      }
      .app-sidebar.collapsed {
        width: 240px;
      }
      .sidebar-toggle-btn {
        display: none;
      }
      .app-content {
        padding: 16px;
      }
    }
  </style>
</head>
