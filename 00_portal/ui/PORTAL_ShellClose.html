      </main>
    </div>
  </div>

  <!-- Scripts del Sidebar Layout -->
  <script>
    // Recuperar estado del sidebar desde LocalStorage para mantener consistencia
    var sidebarState = localStorage.getItem('erp-sidebar-collapsed');
    var sidebar = document.getElementById('app-sidebar');
    var toggleIcon = document.getElementById('toggle-icon');
    
    if (sidebarState === 'true' && sidebar) {
      sidebar.classList.add('collapsed');
      if (toggleIcon) {
        toggleIcon.setAttribute('data-lucide', 'chevrons-right');
      }
    }
    
    function toggleSidebar() {
      if (!sidebar) return;
      var collapsed = sidebar.classList.toggle('collapsed');
      localStorage.setItem('erp-sidebar-collapsed', collapsed ? 'true' : 'false');
      
      if (toggleIcon) {
        toggleIcon.setAttribute('data-lucide', collapsed ? 'chevrons-right' : 'chevrons-left');
        if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [toggleIcon] });
      }
    }
    
    function toggleMobileSidebar() {
      if (!sidebar) return;
      sidebar.classList.toggle('mobile-open');
    }
    
    // Cerrar sidebar móvil si se hace clic fuera de él
    document.addEventListener('click', function(e) {
      if (window.innerWidth <= 768 && sidebar && sidebar.classList.contains('mobile-open')) {
        if (!sidebar.contains(e.target) && !e.target.closest('button[onclick*="toggleMobileSidebar"]')) {
          sidebar.classList.remove('mobile-open');
        }
      }
    });

    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  </script>
</body>
</html>
