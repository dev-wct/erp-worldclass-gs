<script>
/**
 * CORE_FormHandler
 * ─────────────────────────────────────────────────────────────────────────
 * Incluir en todos los formularios con:
 *   include('00_portal/ui/PORTAL_FormHandler');
 *
 * DEPENDENCIAS (incluir antes en el head / shell):
 *   CORE_Components.html  → ERP.UI (msg, spinner, etc.)
 *
 * NAMESPACES:
 *   ERP.Msg       → Mensajes de UI (delega a ERP.UI.msg)
 *   ERP.Btn       → Estado de botones (loading / ready)
 *   ERP.Select    → Carga de catálogos en <select>
 *   ERP.Form      → Recolección y utilidades de formulario
 *   ERP.Gateway   → Adaptador isomórfico GAS ↔ Hono/Vercel
 *
 * CONTRATO DE RESPUESTA DEL SERVIDOR (safeExecute):
 *   Éxito:  { ok: true,  data: any,       mensaje: string }
 *   Error:  { ok: false, errores: string[], mensaje: string }
 *   Error2: { ok: false, error: { mensaje: string } }   ← formato safeExecute
 *
 * EVOLUCIÓN FUTURA (anti vendor lock-in):
 *   Cuando se migre a Hono/Vercel, solo cambia ERP.Gateway.call() internamente.
 *   Todos los formularios siguen usando la misma API sin modificación.
 * ─────────────────────────────────────────────────────────────────────────
 */

var ERP = ERP || {};

/* ══════════════════════════════════════════════════════════════════════
   ERP.Msg — mensajes de UI
   Delega a ERP.UI.msg para mantener una sola fuente de verdad visual.
   Mantiene compatibilidad con el código existente que usa ERP.Msg.*
   ══════════════════════════════════════════════════════════════════════ */
ERP.Msg = (function() {

  function _relay(type, text, id) {
    if (ERP.UI && ERP.UI.msg) {
      ERP.UI.msg(type, text, id);
    } else {
      // Fallback si CORE_Components no está cargado (no debería ocurrir)
      var el = document.getElementById(id || 'erp-msg');
      if (el) { el.textContent = text; el.style.display = 'block'; }
    }
  }

  return {
    success: function(text, id) { _relay('success', text, id); },
    error:   function(text, id) { _relay('error',   text, id); },
    warning: function(text, id) { _relay('warning', text, id); },
    info:    function(text, id) { _relay('info',    text, id); },
    hide:    function(id)       {
      if (ERP.UI && ERP.UI.msgHide) ERP.UI.msgHide(id);
      else {
        var el = document.getElementById(id || 'erp-msg');
        if (el) el.style.display = 'none';
      }
    },
    /** Normaliza cualquier respuesta del servidor y muestra el mensaje adecuado */
    fromResponse: function(res, successId, errorId) {
      if (!res) {
        _relay('error', 'El servidor no devolvió datos.', errorId);
        return;
      }
      if (res.ok) {
        _relay('success', res.mensaje || 'Operación exitosa.', successId);
      } else {
        var text = ERP.Msg.extractError(res);
        _relay('error', text, errorId);
      }
    },
    /**
     * Extrae el texto de error de cualquier formato de respuesta del servidor.
     * Soporta: { errores: [] }, { error: { mensaje } }, { error: string }
     */
    extractError: function(res) {
      if (!res) return 'Error desconocido.';
      if (res.errores && res.errores.length) return res.errores.join('<br>');
      if (res.error)  {
        if (typeof res.error === 'string')         return res.error;
        if (res.error.mensaje)                     return res.error.mensaje;
        if (res.error.detalles && res.error.detalles.length)
          return res.error.mensaje + '<br>' + res.error.detalles.join('<br>');
      }
      return res.mensaje || 'Ocurrió un error. Intenta de nuevo.';
    },
  };
})();


/* ══════════════════════════════════════════════════════════════════════
   ERP.Btn — estado de loading en botones
   ══════════════════════════════════════════════════════════════════════ */
ERP.Btn = (function() {

  /**
   * Pone un botón en estado cargando.
   * @param {string|HTMLElement} btn
   * @param {string} [loadingText]
   * @returns {string} texto original (para restaurar con ready())
   */
  function loading(btn, loadingText) {
    var el = typeof btn === 'string' ? document.getElementById(btn) : btn;
    if (!el) return '';
    var original = el.innerText || el.textContent || '';
    el.disabled = true;
    el.innerHTML =
      (ERP.UI ? ERP.UI.spinner('sm', 'mr-1.5') : '') +
      (loadingText || 'Guardando...');
    return original;
  }

  /**
   * Restaura un botón a su estado activo.
   * @param {string|HTMLElement} btn
   * @param {string} [originalText]
   */
  function ready(btn, originalText) {
    var el = typeof btn === 'string' ? document.getElementById(btn) : btn;
    if (!el) return;
    el.disabled  = false;
    el.innerHTML = originalText || 'Guardar';
    // Reactivar íconos si el texto original contenía data-lucide
    if (typeof lucide !== 'undefined' && originalText && originalText.indexOf('data-lucide') !== -1) {
      lucide.createIcons({ nodes: [el] });
    }
  }

  return { loading: loading, ready: ready };
})();


/* ══════════════════════════════════════════════════════════════════════
   ERP.Select — carga de catálogos en elementos <select>
   ══════════════════════════════════════════════════════════════════════ */
ERP.Select = (function() {

  /**
   * Puebla un <select> con un array de objetos.
   * @param {string}          id          — id del <select>
   * @param {Array}           items       — array de registros del catálogo
   * @param {string}          valueField  — propiedad del objeto → option.value
   * @param {string|Function} labelField  — propiedad → texto, o función (item) => string
   * @param {string}          [emptyLabel]— texto de la opción vacía
   */
  function fill(id, items, valueField, labelField, emptyLabel) {
    var sel = document.getElementById(id);
    if (!sel) return;

    sel.innerHTML = '';

    if (emptyLabel !== undefined) {
      var empty    = document.createElement('option');
      empty.value  = '';
      empty.textContent = emptyLabel;
      sel.appendChild(empty);
    }

    if (!items || items.length === 0) return;

    var getLabel = typeof labelField === 'function'
      ? labelField
      : function(item) { return item[labelField]; };

    items.forEach(function(item) {
      var opt       = document.createElement('option');
      var rawVal    = item[valueField];
      var valStr    = (rawVal !== null && rawVal !== undefined) ? String(rawVal).trim() : '';
      if (/^\d+\.0$/.test(valStr)) {
        valStr = valStr.split('.')[0];
      }
      opt.value     = valStr;
      opt.textContent = String(getLabel(item) || '');
      sel.appendChild(opt);
    });
  }

  /**
   * Selecciona la primera opción cuyo texto incluye una cadena.
   * @param {string} id
   * @param {string} needle — fragmento (case-insensitive)
   */
  function autoSelect(id, needle) {
    var sel = document.getElementById(id);
    if (!sel) return;
    var lower = String(needle).toLowerCase();
    for (var i = 0; i < sel.options.length; i++) {
      if (sel.options[i].text.toLowerCase().indexOf(lower) !== -1) {
        sel.selectedIndex = i;
        return;
      }
    }
  }

  /**
   * Obtiene el texto de la opción seleccionada actualmente.
   * @param {string} id
   * @returns {string}
   */
  function selectedText(id) {
    var sel = document.getElementById(id);
    if (!sel || sel.selectedIndex < 0) return '';
    return sel.options[sel.selectedIndex].text;
  }

  return { fill: fill, autoSelect: autoSelect, selectedText: selectedText };
})();


/* ══════════════════════════════════════════════════════════════════════
   ERP.Form — utilidades de formulario
   ══════════════════════════════════════════════════════════════════════ */
ERP.Form = (function() {

  /**
   * Recoge los valores de un formulario por array de ids.
   * Soporta: input (text/number/date/email/tel), select, textarea, checkbox.
   * @param {string[]} fieldIds
   * @returns {Object}
   */
  function collect(fieldIds) {
    return fieldIds.reduce(function(acc, id) {
      var el = document.getElementById(id);
      if (!el) return acc;
      if (el.type === 'checkbox') {
        acc[id] = el.checked;
      } else {
        acc[id] = el.value;
      }
      return acc;
    }, {});
  }

  /**
   * Rellena los campos de un formulario desde un objeto de datos.
   * Útil para formularios de edición.
   * @param {string[]} fieldIds
   * @param {Object}   data
   */
  function populate(fieldIds, data) {
    fieldIds.forEach(function(id) {
      var el = document.getElementById(id);
      if (!el || data[id] === undefined) return;
      if (el.type === 'checkbox') {
        el.checked = !!data[id];
      } else {
        el.value = data[id] !== null ? data[id] : '';
      }
    });
  }

  /**
   * Limpia todos los campos de un formulario.
   * @param {string[]} fieldIds
   */
  function reset(fieldIds) {
    fieldIds.forEach(function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      if (el.type === 'checkbox') el.checked = false;
      else el.value = '';
    });
  }

  /**
   * Aplica/quita el estado de error a un campo.
   * @param {string}  id
   * @param {boolean} hasError
   * @param {string}  [hint] — texto de hint debajo del input
   */
  function setFieldError(id, hasError, hint) {
    var el = document.getElementById(id);
    if (!el) return;
    if (hasError) {
      el.classList.add('border-error', 'focus:border-error');
      el.classList.remove('border-border');
    } else {
      el.classList.remove('border-error', 'focus:border-error');
      el.classList.add('border-border');
    }
    // Actualizar hint si existe el elemento siguiente
    var nextEl = el.nextElementSibling;
    if (nextEl && nextEl.tagName === 'P') {
      if (hint) {
        nextEl.textContent = hint;
        nextEl.className = hasError
          ? 'text-xs text-error mt-1'
          : 'text-xs text-muted mt-1';
        nextEl.style.display = 'block';
      } else {
        nextEl.style.display = 'none';
      }
    }
  }

  /**
   * Formatea un número como moneda usando Intl.NumberFormat.
   * @param {number} amount
   * @param {string} [currency] — código ISO (default: 'GTQ')
   * @param {string} [locale]   — locale (default: 'es-GT')
   * @returns {string}
   */
  function formatCurrency(amount, currency, locale) {
    return new Intl.NumberFormat(locale || 'es-GT', {
      style:    'currency',
      currency: currency || 'GTQ',
    }).format(isNaN(amount) ? 0 : amount);
  }

  /** Alias para compatibilidad con código existente */
  var formatGTQ = function(amount) { return formatCurrency(amount, 'GTQ', 'es-GT'); };

  /**
   * Retorna la fecha de hoy en formato YYYY-MM-DD (para inputs type="date").
   */
  function today() {
    return new Date().toISOString().split('T')[0];
  }

  return {
    collect:       collect,
    populate:      populate,
    reset:         reset,
    setFieldError: setFieldError,
    formatCurrency: formatCurrency,
    formatGTQ:     formatGTQ,
    today:         today,
  };
})();


/* ══════════════════════════════════════════════════════════════════════
   ERP.Gateway — adaptador isomórfico GAS ↔ Hono/Vercel
   ══════════════════════════════════════════════════════════════════════ */
ERP.Gateway = (function() {

  /** Handler de error por defecto */
  function _defaultFailure(err) {
    ERP.Msg.error('Error del sistema: ' + (err && err.message ? err.message : String(err)));
  }

  /**
   * Llama a una función del servidor GAS con UN argumento (payload).
   *
   * @param {string}   method    — nombre de la función GAS
   * @param {any}      payload   — datos a enviar
   * @param {Function} onSuccess — callback(res)
   * @param {Function} [onFailure] — callback(err)
   */
  function call(method, payload, onSuccess, onFailure) {
    if (ERP.Debug) {
      ERP.Debug.log('CALL', 'Llamando a ' + method, payload);
    }

    var successWrapper = function(res) {
      if (ERP.Debug) {
        ERP.Debug.log('CALL_SUCCESS', method + ' retornó', res);
      }
      if (onSuccess) onSuccess(res);
    };

    var failureWrapper = function(err) {
      if (ERP.Debug) {
        ERP.Debug.log('CALL_ERROR', method + ' falló físicamente', err);
      }
      if (onFailure) onFailure(err);
      else _defaultFailure(err);
    };

    google.script.run
      .withSuccessHandler(successWrapper)
      .withFailureHandler(failureWrapper)
      [method](payload);
  }

  /**
   * Llama a una función GAS con MÚLTIPLES argumentos posicionales.
   * Para funciones como: apiCalc(idEmp, anio, mes, quincena)
   *
   * @param {string}   method    — nombre de la función GAS
   * @param {Array}    args      — array de argumentos en orden
   * @param {Function} onSuccess — callback(res)
   * @param {Function} [onFailure] — callback(err)
   */
  function callArgs(method, args, onSuccess, onFailure) {
    if (ERP.Debug) {
      ERP.Debug.log('CALL_ARGS', 'Llamando a ' + method + ' con argumentos', args);
    }

    var successWrapper = function(res) {
      if (ERP.Debug) {
        ERP.Debug.log('CALL_SUCCESS', method + ' retornó', res);
      }
      if (onSuccess) onSuccess(res);
    };

    var failureWrapper = function(err) {
      if (ERP.Debug) {
        ERP.Debug.log('CALL_ERROR', method + ' falló físicamente', err);
      }
      if (onFailure) onFailure(err);
      else _defaultFailure(err);
    };

    var runner = google.script.run
      .withSuccessHandler(successWrapper)
      .withFailureHandler(failureWrapper);
    runner[method].apply(runner, args || []);
  }

  /**
   * Shortcut: llama, muestra spinner en un botón y maneja la respuesta
   * de forma estándar.
   *
   * @param {object} opts
   *   opts.method      — nombre de la función GAS
   *   opts.payload     — datos (default: {})
   *   opts.args        — array de args (alternativa a payload, usa callArgs)
   *   opts.btnId       — id del botón a deshabilitar durante la llamada
   *   opts.btnText     — texto original del botón (para restaurar)
   *   opts.loadingText — texto del spinner (default: 'Guardando...')
   *   opts.msgId       — id del message strip (default: 'erp-msg')
   *   opts.onSuccess   — callback(res) extra después de mostrar mensaje
   *   opts.onError     — callback(res) extra después de mostrar error
   */
  function submit(opts) {
    var o = opts || {};
    ERP.Msg.hide(o.msgId);
    if (o.btnId) ERP.Btn.loading(o.btnId, o.loadingText || 'Guardando...');

    if (ERP.Debug) {
      ERP.Debug.log('SUBMIT_REQUEST', 'Enviando formulario a ' + o.method, o.payload || o.args || {});
    }

    var handleSuccess = function(res) {
      if (o.btnId) ERP.Btn.ready(o.btnId, o.btnText || 'Guardar');
      
      if (ERP.Debug) {
        ERP.Debug.log(res && res.ok ? 'SUCCESS' : 'FAIL', o.method + ' procesado', res);
      }

      if (!res) {
        ERP.Msg.error('El servidor no devolvió datos.', o.msgId);
        if (o.onError) o.onError(null);
        return;
      }
      if (res.ok) {
        if (res.mensaje) ERP.Msg.success(res.mensaje, o.msgId);
        if (o.onSuccess) o.onSuccess(res);
      } else {
        ERP.Msg.error(ERP.Msg.extractError(res), o.msgId);
        if (o.onError) o.onError(res);
      }
    };

    var handleFailure = function(err) {
      if (o.btnId) ERP.Btn.ready(o.btnId, o.btnText || 'Guardar');
      
      if (ERP.Debug) {
        ERP.Debug.log('ERROR', o.method + ' falló físicamente', err);
      }

      ERP.Msg.error('Error de comunicación: ' + (err && err.message ? err.message : String(err)), o.msgId);
      if (o.onError) o.onError(err);
    };

    if (o.args) {
      callArgs(o.method, o.args, handleSuccess, handleFailure);
    } else {
      call(o.method, o.payload || {}, handleSuccess, handleFailure);
    }
  }

  return { call: call, callArgs: callArgs, submit: submit };
})();
</script>
