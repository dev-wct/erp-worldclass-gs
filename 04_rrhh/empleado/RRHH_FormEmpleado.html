<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <?!= include('02_core/CORE_DesignSystem'); ?>
    <?!= include('02_core/CORE_FormHandler'); ?>
  </head>
  <body>
    <div class="sap-container">
      <div class="sap-card">
        <div class="sap-card-header">
          <div>
            <div class="sap-card-title">👤 Registro de Empleado</div>
            <div class="sap-card-subtitle">HCM - Crear nuevo expediente de personal</div>
          </div>
        </div>

        <div class="sap-card-content">
          <div id="msg" class="sap-message-strip sap-message-strip-error" style="display: none;"></div>

          <form id="empForm" onsubmit="guardar(event)">
            <div class="sap-form-grid">

              <div class="sap-form-group full-width">
                <label class="sap-label required">Nombre Completo</label>
                <input type="text" class="sap-input" id="nombre_completo" placeholder="Ej. Juan Pérez" required>
              </div>

              <div class="sap-form-group">
                <label class="sap-label required">DPI (Documento de Identificación)</label>
                <input type="text" class="sap-input" id="dpi" placeholder="CUI de 13 dígitos" required>
              </div>

              <div class="sap-form-group">
                <label class="sap-label">Email Personal</label>
                <input type="email" class="sap-input" id="email" placeholder="juan.perez@mail.com">
              </div>

              <div class="sap-form-group">
                <label class="sap-label">Teléfono Móvil</label>
                <input type="text" class="sap-input" id="telefono" placeholder="Ej. 55551234">
              </div>

              <!--
                Empresa y Departamento son selects cargados del backend (MDM).
                No se usan inputs numéricos para evitar violaciones de integridad referencial.
              -->
              <div class="sap-form-group">
                <label class="sap-label required">Empresa</label>
                <select id="id_empresa" class="sap-select" required onchange="filtrarDepartamentos()">
                  <option value="">Cargando empresas...</option>
                </select>
              </div>

              <div class="sap-form-group">
                <label class="sap-label required">Departamento</label>
                <select id="id_departamento" class="sap-select" required>
                  <option value="">— Seleccionar empresa primero —</option>
                </select>
              </div>

            </div>

            <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px; padding-top:16px; border-top:1px solid var(--sap-border-light);">
              <button type="button" class="sap-btn" onclick="google.script.host.close()">Cancelar</button>
              <button type="submit" id="btnGuardar" class="sap-btn sap-btn-emphasized">Contratar y Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      var BTN_TEXT = 'Contratar y Guardar';
      // Cache de todos los departamentos para filtrar por empresa en el cliente
      var _todosLosDepartamentos = [];

      window.onload = function() {
        ERP.Gateway.callArgs('apiGetCatalogosEmpleado', [],
          function(data) {
            ERP.Select.fill('id_empresa', data.empresas, 'id_empresa', 'nombre', '— Seleccionar empresa —');
            _todosLosDepartamentos = data.departamentos || [];
          },
          function(err) {
            ERP.Msg.error('⚠️ Error cargando catálogos: ' + err.message);
          }
        );
      };

      /**
       * Filtra los departamentos según la empresa seleccionada.
       * Lógica de filtrado en el cliente (ya tiene todos los datos) — sin round-trip al servidor.
       */
      function filtrarDepartamentos() {
        var idEmpresa = document.getElementById('id_empresa').value;
        var deptosFiltrados = _todosLosDepartamentos.filter(function(d) {
          return String(d.id_empresa) === String(idEmpresa);
        });

        ERP.Select.fill('id_departamento', deptosFiltrados, 'id_departamento', 'nombre',
          deptosFiltrados.length > 0
            ? '— Seleccionar departamento —'
            : 'Sin departamentos para esta empresa'
        );
      }

      function guardar(e) {
        e.preventDefault();
        ERP.Btn.loading('btnGuardar');
        ERP.Msg.hide();

        var data = ERP.Form.collect([
          'nombre_completo', 'dpi', 'email', 'telefono', 'id_empresa', 'id_departamento'
        ]);

        ERP.Gateway.call('apiGuardarEmpleado', data,
          function(res) {
            if (res.ok) {
              google.script.host.close();
            } else {
              ERP.Msg.error(res.errores.join('\n'));
              ERP.Btn.ready('btnGuardar', BTN_TEXT);
            }
          },
          function(err) {
            ERP.Msg.error(err.message);
            ERP.Btn.ready('btnGuardar', BTN_TEXT);
          }
        );
      }
    </script>
  </body>
</html>
